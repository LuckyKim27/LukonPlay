<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Anime - Lukon Play</title>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <main class="wrapper">
        <header class="top-bar">
            <button class="btn-back" onclick="location.href='index.html'">← Kembali</button>
            <button id="btnSave" class="btn-pill-action" onclick="toggleSave()">+ Simpan</button>
        </header>

        <div class="poster-container">
            <img id="poster" src="" alt="Poster Anime" class="detail-poster">
        </div>

        <section class="anime-info">
            <h1 id="judul" class="detail-title">Memuat judul...</h1>
            <p id="genre" class="detail-genre">Anime</p>
            <p id="deskripsi" class="detail-desc">Memuat deskripsi anime...</p>
            
            <a id="btnPlay" href="#" class="btn-primary-play">▶ Putar Episode 1</a>
        </section>

        <section class="episodes-section">
            <h2 class="section-title">Daftar Episode</h2>
            <div id="episodeList" class="episode-list">
                </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/detail.js"></script>
</body>
</html>

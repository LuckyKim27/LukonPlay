<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukon Play - Nonton Anime Resmi</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/navbar.css">
</head>
<body>

    <main class="wrapper">
        <header class="app-header">
            <h1 class="logo">LUKON PLAY</h1>
        </header>

        <div id="searchWrapper" class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Cari anime favoritmu..." 
                onkeyup="handleSearch()"
                autocomplete="off"
            >
        </div>

        <div id="homeTabArea">
            <section class="hero-banner" id="heroBanner">
                <div class="hero-content">
                    <span class="hero-badge">🔥 Highlight</span>
                    <h2 id="heroTitle" class="hero-title">Memuat...</h2>
                    <p id="heroDesc" class="hero-desc">Saksikan tayangan anime terbaru secara gratis dan resmi.</p>
                    <a id="heroPlayBtn" href="#" class="btn-hero-play">▶ Tonton Sekarang</a>
                </div>
            </section>

            <section class="section">
                <div class="genre-container">
                    <button class="chip active" onclick="filterGenre('all', this)">Semua</button>
                    <button class="chip" onclick="filterGenre('Action', this)">Action</button>
                    <button class="chip" onclick="filterGenre('Fantasy', this)">Fantasy</button>
                    <button class="chip" onclick="filterGenre('Romance', this)">Romance</button>
                    <button class="chip" onclick="filterGenre('Comedy', this)">Comedy</button>
                    <button class="chip" onclick="filterGenre('Isekai', this)">Isekai</button>
                </div>
            </section>

            <section id="trendingSection" class="section">
                <h2 class="section-title">Trending Anime</h2>
                <div id="trendingContainer" class="horizontal-scroll"></div>
            </section>

            <section class="section">
                <h2 id="sectionTitle" class="section-title">Rekomendasi Anime</h2>
                <div id="recommendationContainer" class="grid-container"></div>
            </section>
        </div>

        <div id="listTabArea" style="display: none;">
            <h2 id="listTabTitle" class="section-title" style="margin-top: 10px;">Daftar Saya</h2>
            <div id="listTabContainer" class="grid-container"></div>
        </div>

        <div id="profileTabArea" style="display: none;">
            <div id="profileContent" class="profile-card">
                </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button id="nav-home" class="nav-item active" onclick="switchTab('home')">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </button>
        <button id="nav-mylist" class="nav-item" onclick="switchTab('mylist')">
            <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
            <span>My List</span>
        </button>
        <button id="nav-history" class="nav-item" onclick="switchTab('history')">
            <svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9z"/></svg>
            <span>History</span>
        </button>
        <button id="nav-profile" class="nav-item" onclick="switchTab('profile')">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Profile</span>
        </button>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

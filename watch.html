<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nonton Anime - Lukon Play</title>
    
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="watch-page-bg">

    <main class="wrapper">
        <header class="top-bar">
            <a id="backLink" href="index.html" class="btn-back">← Kembali</a>
        </header>

        <div class="video-container">
            <iframe id="player" src="" allowfullscreen allow="autoplay"></iframe>
        </div>

        <section class="watch-info">
            <h2 id="animeTitle" class="watch-anime-title">Memuat Anime...</h2>
            <p id="epTitle" class="watch-ep-title">Episode 1</p>

            <div class="action-pills">
                <button class="pill-btn" onclick="addLike()">
                    👍 <span id="likeCount">0</span>
                </button>
                <button class="pill-btn" onclick="addUnlike()">
                    👎 <span id="unlikeCount">0</span>
                </button>
            </div>
        </section>

        <section class="horizontal-ep-section">
            <h3 class="sub-title">Pilih Episode</h3>
            <div id="epHorizontal" class="horizontal-ep-list">
                </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/player.js"></script>
</body>
</html>

name: YouTube to Supabase Auto Sync

on:
  schedule:
    # Otomatis berjalan setiap 1 jam sekali
    - cron: '0 * * * *'
  workflow_dispatch: # Tombol untuk menjalankan manual kapan saja

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          cd sync-script
          npm install

      - name: Run Sync Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd sync-script
          node sync.js

